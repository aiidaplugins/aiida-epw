default_inputs:
  clean_workdir: True
  pseudo_family: 'PseudoDojo/0.5/PBE/SR/standard/upf'
  qpoints_distance: 0.5
  kpoints_distance_scf: 0.15
  kpoints_factor_nscf: 2
  # To set for the NSCF step of the Wannier90 work chain
  # One can either use `nscf` mode or `bands` mode. For the `nscf` mode,
  # the `nosym` and `noinv` must be set to True to avoid pw.x automatically
  # adds more (symmetry-equivalent) kpoints to the user-specified kpoints.
  # For the `bands` mode, pw.x will use exactly what the user provided.
  # In addition, it seems epw.x has some problem when restarting from a
  # pw.x calculation with `nosym` and `noinv` set to True, therefore, we
  # switch to the `bands` mode.
  w90_bands:
    nscf:
      pw:
        parameters:
          SYSTEM:
            nosym: False
            noinv: False
          CONTROL:
            calculation: bands
    wannier90:
      wannier90:
        parameters:
          write_bvec: True
  ph_bands:
    dynamical_matrix:
      ph_base:
        ph:
          settings:
            PREPARE_FOR_EPW: True
          parameters:
            INPUTPH:
              epsil: True
    interpolate:
      q2r:
        q2r:
          parameters:
            INPUT:
              zasr: simple
      matdyn:
        matdyn:
          parameters:
            INPUT:
              asr: simple
              dos: False
  epw_base:
    options:
      resources:
        num_machines: 1
      max_wallclock_seconds: 43200  # Twelve hours
      withmpi: True
      stash:
        source_list:
          - crystal.fmt
          - dmedata.fmt
          - epwdata.fmt
          - selecq.fmt
          - vmedata.fmt
          - wigner.fmt
          - quadrupole.fmt
          - restart.fmt
          - decay.H
          - decay.v
          - decay.P
          - decay.dynmat
          - decay.epmate
          - decay.epmatp
          - aiida.kgmap
          - aiida.kmap
          - aiida.ukk
          - out/aiida.epmatwp
          - save
    parameters:
      INPUTEPW:
        elph: True
        epbread: False
        epbwrite: True
        epwread: False
        epwwrite: True
        fsthick: 10000
        temps: 300
        asr_typ: 'simple'
        vme: 'wannier' #'dipole' or 'wannier'
        wannierize: False
        etf_mem: 1
        lpolar: True


  epw_bands:
    options:
      resources:
        num_machines: 1
      withmpi: True
    parameters:
      INPUTEPW:
        band_plot: True
        elph: True
        asr_typ: 'simple'
        epbread: False
        epbwrite: False
        epwread: True
        epwwrite: False
        wannierize: False
        lpolar: True


default_protocol: moderate
protocols:
  moderate:
    description: 'Protocol to perform a electron-phonon calculation at normal precision at moderate computational cost.'
  precise:
    description: 'Protocol to perform a electron-phonon calculation at high precision at higher computational cost.'
    qpoints_distance: 0.3
  fast:
    description: 'Protocol to perform a electron-phonon calculation at low precision at minimal computational cost for testing purposes.'
    qpoints_distance: 1.1
